<!DOCTYPE html>
<html>
<head>
    <title>Best Rental Deals</title>
</head>
<body>

<h1>Best Rental Deals</h1>

    <th>Address</th>
    <th>City</th>
    <th>Actual Rent</th>
    <th>Expected Rent</th>

{% for deal in deals_data %}

<tr>
    <td>{{ deal[0] }}</td>

</tr>

{% endfor %}

</table>
